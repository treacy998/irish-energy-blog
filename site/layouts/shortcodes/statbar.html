<div style="display:flex;gap:10px;flex-wrap:wrap;margin:1.25rem 0;">
  {{ range slice (dict "value" (.Get "mean") "label" "Mean") (dict "value" (.Get "peak") "label" "Peak") (dict "value" (.Get "min") "label" "Min") (dict "value" (.Get "spread") "label" "Spread") }}
  <div style="flex:1;min-width:110px;background:#112236;border:1px solid #1E3450;border-radius:8px;padding:12px 14px;text-align:center;">
    <div style="font-family:'JetBrains Mono',monospace;font-size:1.35rem;font-weight:500;color:#2EC4B6;line-height:1.2;">{{ .value }}</div>
    <div style="font-size:0.72rem;color:#8BA3BE;margin-top:4px;letter-spacing:0.04em;text-transform:uppercase;">{{ .label }}</div>
  </div>
  {{ end }}
</div>
